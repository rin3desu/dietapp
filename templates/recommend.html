<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIメニュー推薦 - Diet App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .recommend-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .setup-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        .submit-btn { 
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:active { transform: scale(0.98); }

        /* AI回答エリアのスタイル */
        .ai-result-card { background: #fff; padding: 30px; border-radius: 15px; border-left: 8px solid #764ba2; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .ai-content { 
            white-space: pre-wrap; /* これがあると、AIの改行がそのまま反映されます */
            line-height: 1.6;
            font-family: monospace; /* フォントを等幅にすると、より「リスト」っぽくなります */
        }
        
        /* ローディング表示 */
        #loading { display: none; text-align: center; margin-top: 20px; color: #764ba2; font-weight: bold; }
    </style>
</head>
<body>
    <div class="recommend-container">
        <h2 style="text-align: center;">🤖 AIパーソナルトレーナー</h2>
        
        <div class="setup-card">
            <form method="POST" id="recommend-form">
                <div class="form-group">
                    <label>どこでトレーニングしますか？</label>
                    <select name="gym_id" required>
                        <option value="">ジムを選択してください</option>
                        {% for gym in gyms %}
                            <option value="{{ gym['id'] }}">{{ gym['name'] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>今日のターゲット部位</label>
                    <select name="target_muscle" required>
                        <option value="胸">胸</option>
                        <option value="背中">背中</option>
                        <option value="脚">脚</option>
                        <option value="肩">肩</option>
                        <option value="腕">腕</option>
                        <option value="腹">腹</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>確保できる時間（分）</label>
                    <input type="number" name="time_minutes" value="45" min="10" max="180">
                </div>

                <button type="submit" class="submit-btn" id="generate-btn">メニューを生成する</button>
            </form>
            
            <div id="loading">AIがメニューを考案中です。数秒お待ちください...</div>
        </div>

        {% if recommendation %}
            <div class="ai-result-card">
                <h3 style="margin-top: 0;">📋 AIの提案メニュー</h3>
                <div class="ai-content">{{ recommendation }}</div>
            </div>
        {% endif %}

        <div style="text-align: center; margin-top: 30px;">
            <a href="{{ url_for('mypage') }}">マイページに戻る</a>
        </div>
    </div>

    <script>
        // 送信時にボタンを無効化し、ローディングを表示する
        document.getElementById('recommend-form').onsubmit = function() {
            document.getElementById('generate-btn').disabled = true;
            document.getElementById('generate-btn').style.opacity = '0.5';
            document.getElementById('loading').style.display = 'block';
        };
    </script>
</body>
</html>
