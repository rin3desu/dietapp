<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>{{ gym['name'] }} のマシン一覧 - Diet App</title>
    <style>
        .container { max-width: 600px; margin: 0 auto; padding: 20px; font-family: sans-serif; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 20px; background-color: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { padding: 10px 15px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .machine-list { list-style: none; padding: 0; }
        .machine-item { background: white; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .badge { background: #3498db; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>{{ gym['name'] }} のマシン一覧</h2>

        <div class="card">
            <h3>新しいマシンを登録</h3>
            <form method="POST">
                <div class="form-group">
                    <label for="target_muscle">鍛えられる部位</label>
                    <select name="target_muscle" id="target_muscle" required>
                        <option value="">-- 選択してください --</option>
                        <option value="胸">胸</option>
                        <option value="背中">背中</option>
                        <option value="脚">脚</option>
                        <option value="肩">肩</option>
                        <option value="腕">腕</option>
                        <option value="腹">腹</option>
                        <option value="その他">その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="machine_name">マシンの名前</label>
                    <input type="text" name="machine_name" id="machine_name" placeholder="例: ラットプルダウン" required>
                </div>
                <button type="submit" class="btn">マシンを追加</button>
            </form>
        </div>

        <div class="card">
            <h3>登録済みのマシン</h3>
            {% if machines %}
                <ul class="machine-list">
                {% for machine in machines %}
                    <li class="machine-item">
                        <span>{{ machine['name'] }}</span>
                        <span class="badge">{{ machine['target_muscle'] }}</span>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>まだマシンが登録されていません。</p>
            {% endif %}
        </div>

        <p><a href="{{ url_for('mypage') }}">マイページに戻る</a></p>
    </div>
</body>
</html>
