{% extends 'layout.html' %}

{% block title %}食事記録フォーム - Diet App{% endblock %}

{% block body_attributes %}
    class="page-background" style="background-image: url('https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=1780');"
{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/meal.css') }}">

<div class="content-container">
    <h1 class="page-title">新しい食事を記録</h1>

    <div class="form-card">
        <form action="{{ url_for('add_meal') }}" method="post" enctype="multipart/form-data" class="styled-form">
            
            <div class="form-group">
                <label for="date"><i class="far fa-calendar-alt"></i> 日付</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="time_slot"><i class="far fa-clock"></i> 時間帯</label>
                <select id="time_slot" name="time_slot" required>
                    <option value="">--選択してください--</option>
                    <option value="朝">朝</option>
                    <option value="昼">昼</option>
                    <option value="夜">夜</option>
                    <option value="間食">間食</option>
                </select>
            </div>

            <div class="form-group">
                <label for="content"><i class="fas fa-utensils"></i> 食べたもの</label>
                <textarea id="content" name="content" rows="3" placeholder="例: ご飯、味噌汁、焼き魚..." required></textarea>
            </div>

            <div class="form-group">
                <label for="ingredients"><i class="fas fa-carrot"></i> 食材（任意）</label>
                <textarea id="ingredients" name="ingredients" rows="2" placeholder="例: 鮭、大根、ネギ..."></textarea>
            </div>

            <div class="form-group">
                <label for="image"><i class="fas fa-camera"></i> 写真（任意）</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">記録する</button>
                <a href="{{ url_for('meal_page') }}" class="btn-back">戻る</a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
